# Rate Limiting Zones
# Limit by IP address

# Zone for general API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Zone for login endpoint (stricter)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Zone for upload endpoint
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Log format for rate limiting
log_format rate_limited '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rate_limited';
