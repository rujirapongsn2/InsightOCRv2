# Trusted proxy / real client IP handling.
#
# Only trust addresses that are part of the local Docker/internal proxy path.
# If production adds a CDN or load balancer in front of this Nginx instance,
# add its published CIDR ranges here before relying on X-Forwarded-For.
real_ip_header X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from 127.0.0.1;
set_real_ip_from 172.16.0.0/12;

# Rate Limiting Zones
# After the real_ip settings above, $binary_remote_addr is the real client IP
# when the request comes from a trusted proxy, not the Docker bridge address.

# Zone for general API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# Zone for login endpoint (stricter)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Zone for upload/process endpoints
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

# Zone for long-lived SSE / streaming endpoints
limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=30r/m;

# Connection limits per real client IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
limit_conn_zone $binary_remote_addr zone=stream_conn_limit:10m;

# Bot / exploit probe detection. This is a host-level fallback for the edge WAF:
# it catches obvious scanner paths and shell payloads in URI/query/user-agent
# without blocking valid /api/v1 calls or normal Next.js static assets.
map $request_uri $bad_probe_uri {
    default 0;
    ~*^/adfa(?:$|[/?#]) 1;
    ~*(?:^|[?&])[^#]*(?:wget|curl|base64(?:\s|%20|%7c|\|)|(?:%7c|\|)(?:\s|%20)*sh|/bin/sh|chmod(?:\s|%20)|busybox) 1;
}

map $http_user_agent $bad_probe_agent {
    default 0;
    ~*(?:acunetix|dirbuster|masscan|nikto|nmap|sqlmap|zgrab) 1;
}

map "$request_method:$uri" $bad_probe_target {
    default 0;
    ~*^GET:/adfa(?:$|/) 1;
    ~*^POST:/$ 1;
    ~*^POST:/_next(?:$|/) 1;
    ~*^POST:/api/?$ 1;
}

map "$bad_probe_uri$bad_probe_agent$bad_probe_target" $block_bad_probe {
    default 0;
    ~1 1;
}

# Log format for rate limiting
log_format rate_limited '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       '"$http_x_forwarded_for" rate_limited';
