# Upstream definitions for backend and frontend services
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost insightdoc.softnix.ai;

    if ($block_bad_probe) {
        return 444;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client body size (for file uploads)
    client_max_body_size 100M;

    # Default proxy timeouts; API locations override these for long-running work.
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Backend Health Check
    location /health {
        limit_req zone=api_limit burst=5;
        proxy_pass http://backend/health;
        include /etc/nginx/conf.d/proxy-common.inc;
        access_log off;
    }

    # Login is intentionally stricter than general API traffic.
    location ~ ^/api/v1/(auth/)?login/access-token$ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Queueing a document should be quick, but protect it separately from general API traffic.
    location ~ ^/api/v1/documents/[^/]+/process$ {
        limit_req zone=upload_limit burst=10 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Long-running schema suggestion endpoint (OCR + polling).
    location = /api/v1/schemas/suggest-from-file {
        limit_req zone=upload_limit burst=10 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Long-running integration dispatch endpoints.
    location = /api/v1/integrations/send {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    location ~ ^/api/v1/external/jobs/.+/send-integration$ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # SSE / streaming endpoints get their own connection bucket so open streams do not starve normal API calls.
    location = /api/v1/integrations/send-stream {
        limit_req zone=stream_limit burst=30 nodelay;
        limit_conn stream_conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/stream-proxy.inc;
    }

    location ~ ^/api/v1/documents/[^/]+/progress-stream$ {
        limit_req zone=stream_limit burst=30 nodelay;
        limit_conn stream_conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/stream-proxy.inc;
    }

    location ~ ^/api/v1/(agent|chat)/conversations/[^/]+/messages$ {
        limit_req zone=stream_limit burst=30 nodelay;
        limit_conn stream_conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/stream-proxy.inc;
    }

    # Backend API - /api/v1
    location /api/v1 {
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 50;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Backward-compatible API fallback for non-v1 /api paths.
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 50;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Next.js HMR WebSocket endpoint
    location /_next/webpack-hmr {
        proxy_pass http://frontend/_next/webpack-hmr;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Static files from Next.js
    location /_next/static {
        proxy_pass http://frontend;
        proxy_cache_valid 200 60m;
        proxy_buffering on;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Frontend - Next.js Application
    location / {
        proxy_pass http://frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Nginx status page (optional, for monitoring)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker network
        deny all;
    }
}

# HTTPS server - terminates TLS and applies the same routing policy as HTTP.
server {
    listen 443 ssl;
    http2 on;
    server_name localhost insightdoc.softnix.ai;

    if ($block_bad_probe) {
        return 444;
    }

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Login is intentionally stricter than general API traffic.
    location ~ ^/api/v1/(auth/)?login/access-token$ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Queueing a document should be quick, but protect it separately from general API traffic.
    location ~ ^/api/v1/documents/[^/]+/process$ {
        limit_req zone=upload_limit burst=10 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Long-running schema suggestion endpoint (OCR + polling).
    location = /api/v1/schemas/suggest-from-file {
        limit_req zone=upload_limit burst=10 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Long-running integration dispatch endpoints.
    location = /api/v1/integrations/send {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    location ~ ^/api/v1/external/jobs/.+/send-integration$ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 30;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # SSE / streaming endpoints get their own connection bucket so open streams do not starve normal API calls.
    location = /api/v1/integrations/send-stream {
        limit_req zone=stream_limit burst=30 nodelay;
        limit_conn stream_conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/stream-proxy.inc;
    }

    location ~ ^/api/v1/documents/[^/]+/progress-stream$ {
        limit_req zone=stream_limit burst=30 nodelay;
        limit_conn stream_conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/stream-proxy.inc;
    }

    location ~ ^/api/v1/(agent|chat)/conversations/[^/]+/messages$ {
        limit_req zone=stream_limit burst=30 nodelay;
        limit_conn stream_conn_limit 20;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/stream-proxy.inc;
    }

    # Backend API - /api/v1
    location /api/v1 {
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 50;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Backward-compatible API fallback for non-v1 /api paths.
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 50;
        error_log /var/log/nginx/rate_limit.log warn;

        proxy_pass http://backend;
        include /etc/nginx/conf.d/api-proxy.inc;
    }

    # Next.js HMR WebSocket endpoint
    location /_next/webpack-hmr {
        proxy_pass http://frontend/_next/webpack-hmr;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Next.js static files (long-lived cache)
    location /_next/static {
        proxy_pass http://frontend;
        proxy_cache_valid 200 60m;
        proxy_buffering on;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # All other requests -> Next.js frontend
    location / {
        proxy_pass http://frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}
