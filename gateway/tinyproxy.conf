# InsightDOC egress proxy (production gateway)
# User tinyproxy
# Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 600
# PidFile "/run/tinyproxy/tinyproxy.pid"
LogLevel Info
MaxClients 100
MinSpareServers 5
MaxSpareServers 20
StartServers 10
MaxRequestsPerChild 0
DisableViaHeader Yes
ViaProxyName "insightocr-gateway"

# Allow internal Docker ranges
Allow 127.0.0.1
Allow 172.16.0.0/12
Allow 10.0.0.0/8
Allow 192.168.0.0/16

# Allow HTTPS/HTTP connect ports commonly needed (extend if required)
ConnectPort 443
ConnectPort 8443
ConnectPort 80
ConnectPort 9001
