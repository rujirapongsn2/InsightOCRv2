services:
  nginx:
    image: nginx:1.25-alpine
    container_name: softnix_ocr_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - public
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      # Use HTTPS directly on IPv4 loopback to avoid redirects/IPv6 resolution issues
      test: [ "CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    container_name: softnix_ocr_backend
    expose:
      - "8000"
    # volumes:
    #   - ./backend:/app
    #   - documents_uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - HTTP_PROXY=http://gateway:8888
      - HTTPS_PROXY=http://gateway:8888
      - NO_PROXY=localhost,127.0.0.1,backend,db,redis,minio,frontend,nginx,gateway
    depends_on:
      - db
      - redis
    networks:
      - internal # isolate; outbound via gateway proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: ./backend
    container_name: softnix_ocr_celery
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    # volumes:
    #   - ./backend:/app
    #   - documents_uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - HTTP_PROXY=http://gateway:8888
      - HTTPS_PROXY=http://gateway:8888
      - NO_PROXY=localhost,127.0.0.1,backend,db,redis,minio,frontend,nginx,gateway
    depends_on:
      - db
      - redis
      - backend
    networks:
      - internal # isolate; outbound via gateway proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: softnix_ocr_frontend
    expose:
      - "3000"
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=10M
      - /run:size=1M
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: softnix_ocr_db
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=softnix_ocr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 3s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: softnix_ocr_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    expose:
      - "6379"
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio
    container_name: softnix_ocr_minio
    expose:
      - "9000"
      - "9001"
    # Production: MinIO ports are not exposed to host for security
    # Development: Uncomment ports below if you need direct access to MinIO Console
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build: ./gateway
    container_name: softnix_ocr_gateway
    expose:
      - "8888"
    networks:
      - public # egress to internet
      - internal # reachable from backend/worker
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128M
    read_only: true
    tmpfs:
      - /run/tinyproxy:size=1M,uid=100,gid=102
      - /var/log/tinyproxy:size=1M,uid=100,gid=102
      - /tmp:size=1M
    restart: unless-stopped
networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: ${DOCKER_INTERNAL_NETWORK:-true} # isolate DB/Redis/MinIO; override with DOCKER_INTERNAL_NETWORK=false for local dev

volumes:
  postgres_data:
  minio_data:
  documents_uploads:
